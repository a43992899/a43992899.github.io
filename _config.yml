# google analytics
google_analytics_id      :  # get google_analytics_id from https://analytics.google.com/analytics/

# Optional privacy-friendly visitor metrics. GitHub Pages is static, so real
# counts and locations need an external analytics endpoint before this is shown.
visitor_stats:
  enabled                : false
  provider               :
  api_url                :
  public_dashboard_url   :

comments:
