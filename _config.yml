  giscus:
    repo                 : "a43992899/a43992899.github.io"
    repo_id              : "R_kgDON3iyWg"
    category             : "General"
    category_id          : "DIC_kwDON3iyWs4C9Iak"
    mapping              : "pathname"
    strict               : "0"
    reactions_enabled    : "1"
    emit_metadata        : "0"
    input_position       : "bottom"
    theme                : "preferred_color_scheme"
    lang                 : "zh-CN"

