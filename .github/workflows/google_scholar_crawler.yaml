name: Update Site Metrics

on:
 workflow_dispatch:
 schedule:
  - cron: '17 3 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v5

    - uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install requirements
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements-metrics.txt

    - name: Update metrics
      run: |
        python scripts/update_metrics.py \
          --output results/metrics.json \
          --previous-url "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/site-metrics/metrics.json" \
          --scholar-timeout-seconds 180
      env:
        GOOGLE_SCHOLAR_ID: Qd_hX1cAAAAJ
        GITHUB_TOKEN: ${{ github.token }}

    - name: Publish metrics branch
      run: |
        cd results
        git init
        git config user.name "${GITHUB_ACTOR}"
        git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
        git add metrics.json
        git commit -m "Update site metrics"
        git push "https://${GITHUB_ACTOR}:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git" HEAD:site-metrics --force
